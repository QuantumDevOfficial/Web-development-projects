<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sign-up.css">
    <title>Sign Up Page | Promise</title>
</head>
<body>
    <div class="container">
        <form action="#">
            <p class="login">Sign Up</p>
            <div class="user-box">
                <input type="text" id="username" name="Username" required>
                <label for="username">Username</label>
            </div>

            <div class="user-box">
                <input type="email" id="email" name="Email" required>
                <label for="email">Email</label>
            </div>

            <div class="user-box password-box">
                <input type="text" id="password" name="Password" required>
                <label for="password">Password</label>
            </div>

            <p class="login-link">Already Have an Account?<span><a href="index.html">Login</a></span></p>
            <a class="register" href="#">Create Account</a>
        </form>
    </div>
</body>
</html>
