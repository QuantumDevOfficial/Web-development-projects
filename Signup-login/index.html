<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login Page | Promise</title>
</head>
<body>
    <div class="container">
        <form action="#">
            <p class="login">Login</p>
            <div class="user-box">
                <input type="text" id="username" name="Username" required>
                <label for="username">Username</label>
            </div>

            <div class="user-box password-box">
                <input type="text" id="password" name="Password" required>
                <label for="password">Password</label>
            </div>

            <div class="recognition-forget-box">
                <div>
                    <input type="checkbox" id="recognition">
                    <label for="recognition">Remember Me</label>
                </div>

                <span><a href="#">Forgot Password?</a></span>
            </div>

            <a class="login-link" href="#">Login</a>
            <p class="register">Don't Have an Account?<span><a href="sign-up.html">Register</a></span></p>
        </form>
    </div>
</body>
</html>
