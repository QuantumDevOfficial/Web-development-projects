<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <hr dotted>
        <img src="images/coconut.png" alt="Profile Picture" class="profile-pic">

        <button class="btn">Connect</button>
        <hr>
    </div>
    <br><br>
</body>
</html>
